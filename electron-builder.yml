appId: com.prembroke.terminal
productName: Prembroke
copyright: Prembroke — Conviction Terminal
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - package.json
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: build/icon.ico
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: Prembroke
  uninstallDisplayName: Prembroke
portable:
  artifactName: Prembroke-${version}-portable.exe
